services:
- name: "TEST1"
  port: 3129 # Port number to listen on
  use_tls: false  # Optional: Use TLS on this proxy listener (https_port)
  enabled: true  # Set to true to enable this service
  on_calendar:  # Optional: systemd OnCalendar format for start/stop timers
    string: "Mon..Fri 08:00..21:00"
  allowed_ips:  # Optional: List of source IPs/CIDRs allowed to connect (default: all IPs allowed)
    - 192.168.1.0/24
    - 10.0.0.1
  whitelists:  # Optional: Destination domains allowed. If omitted, all destinations are allowed.
    list:
      - .example.com
      - .trusted.org

- name: "TEST2"
  port: 3130
  use_tls: true
  enabled: true
  whitelists:
    shared:
      - whitelist1
      - whitelist2
      - fremover_list

- name: "TEST3"
  port: 3131
  use_tls: false
  enabled: true
  on_calendar:
    shared: off_hours

- name: "TEST_GUL"
  port: 3132
  use_tls: true
  enabled: true
  allowed_ips:
    - 129.242.32.226
    - 10.226.0.0/16

- name: "TEST_RØD"
  port: 3133
  use_tls: true
  enabled: true
  allowed_ips:
    - 129.242.32.227
    - 10.227.0.0/16

- name: "EDL_TEST"
  port: 3134
  use_tls: true
  enabled: true
  whitelists:
    list:
      - .internal.example.com                # Literal domain (exact)
    shared:
      - whitelist2                           # Reference to shared list
    edl:
      - https://engine.edlmanager.com/v1/11b0bb2c-9795-47d9-94c1-54aa4d6e446e/  # External Data List (plaintext URL)


shared:
  lists: 
    whitelist1:
      - .example.com
      - .trusted.org
    whitelist2:
      - .nrk.no
      - .uit.no
      - .tv2.no
      - .vg.no
    fremover_list:
      - .fremover.no
      - .lwcdn.com
      - .acdn.no
      - .api.no
      - .doubleclick.net
      - .brandmetrics.com
      - .lwadm.com
      - .e-pages.dk
    testlist2:
      - .dagbladet.no
  calendars:
    work_hours: "Mon..Fri 08:00..18:00"
    off_hours: "Mon..Fri 18:00..08:00, Sat..Sun 00:00..23:59:59"